name: Promote verified release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing draft tag to verify and publish
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ inputs.tag }}

jobs:
  promote:
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
    steps:
      - name: Validate requested tag format
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "Release tag must be a semantic version such as v0.6.0 or v0.9.0-rc.1." >&2
            exit 1
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - name: Verify tag identity, version, and main ancestry
        shell: bash
        run: |
          tag_ref="refs/tags/$RELEASE_TAG"
          if ! git show-ref --verify --quiet "$tag_ref"; then
            echo "$RELEASE_TAG is not an existing tag." >&2
            exit 1
          fi
          if [[ "$(git cat-file -t "$tag_ref")" != "tag" ]]; then
            echo "$RELEASE_TAG must be an annotated tag." >&2
            exit 1
          fi

          tag_commit="$(git rev-parse "$tag_ref^{commit}")"
          if [[ "$(git rev-parse HEAD)" != "$tag_commit" ]]; then
            echo "The checked-out commit does not match $RELEASE_TAG." >&2
            exit 1
          fi

          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "$RELEASE_TAG does not point to a commit reachable from main." >&2
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$package_version" != "$version" ]]; then
            echo "$RELEASE_TAG does not match package.json version $package_version." >&2
            exit 1
          fi
          if ! grep -Fq "## $version -" CHANGELOG.md; then
            echo "CHANGELOG.md has no $version release entry." >&2
            exit 1
          fi
          if [[ ! -f "docs/releases/v${version}.md" ]]; then
            echo "docs/releases/v${version}.md is missing." >&2
            exit 1
          fi
      - name: Download draft assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [[ "$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)" != "true" ]]; then
            echo "$RELEASE_TAG is not an unpublished draft release." >&2
            exit 1
          fi
          gh release download "$RELEASE_TAG" --dir release-assets
      - name: Verify public-bound assets
        shell: bash
        run: |
          version="$RELEASE_TAG"
          version="${version#v}"
          node scripts/verify-release-assets.mjs release-assets "$version"
          (cd release-assets && sha256sum --check SHASUMS256.txt)
          node scripts/verify-sbom.mjs release-assets/*.cdx.json
      - name: Publish verified draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$RELEASE_TAG" --draft=false --latest
