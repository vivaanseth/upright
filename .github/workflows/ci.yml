name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "41 9 * * 1"

permissions:
  contents: read

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2025, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.5.3
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:coverage
      - run: pnpm build
      - name: Build deterministic E2E fixture
        env:
          UPRIGHT_E2E_FIXTURE: "true"
        run: pnpm exec electron-vite build
      - name: Electron E2E
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            xvfb-run --auto-servernum pnpm test:e2e
          else
            pnpm test:e2e
          fi

  release-readiness:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.5.3
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm scan:privacy
      - run: pnpm audit:prod
      - run: pnpm audit:licenses
      - run: pnpm build
      - name: Validate runtime SBOM and notices
        run: |
          pnpm generate:sbom linux /tmp/upright-runtime-sbom.cdx.json
          pnpm verify:sbom /tmp/upright-runtime-sbom.cdx.json
          pnpm verify:notices /tmp/upright-runtime-sbom.cdx.json --check
      - run: pnpm package
      - name: Prepare Linux sandbox helper for packaged smoke
        run: |
          sudo chown root:root dist/linux-unpacked/chrome-sandbox
          sudo chmod 4755 dist/linux-unpacked/chrome-sandbox
      - name: Verify and launch packaged application
        run: xvfb-run --auto-servernum pnpm verify:built-package dist

  dependency-review:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
