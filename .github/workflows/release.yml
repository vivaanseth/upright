name: Desktop release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  UPRIGHT_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
  VERSION: ${{ github.ref_name }}

jobs:
  metadata:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify tag, package, and changelog versions
        shell: bash
        run: |
          version="${VERSION#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must be a semantic version such as v0.1.1." >&2
            exit 1
          fi
          if [[ "$package_version" != "$version" ]]; then
            echo "Tag $version does not match package.json $package_version." >&2
            exit 1
          fi
          if ! grep -Fq "## $version -" CHANGELOG.md; then
            echo "CHANGELOG.md has no $version release entry." >&2
            exit 1
          fi
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Release tag must point to a commit reachable from main." >&2
            exit 1
          fi

  build:
    needs: metadata
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            command: pnpm dist:mac
            name: macos
          - os: windows-2025
            command: pnpm dist:win
            name: windows
          - os: ubuntu-24.04
            command: pnpm dist:linux
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.5.3
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm libarchive-tools
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:coverage
      - run: pnpm scan:privacy
      - run: pnpm audit:prod
      - run: pnpm audit:licenses
      - run: pnpm build
      - name: Build deterministic E2E fixture
        env:
          UPRIGHT_E2E_FIXTURE: "true"
        run: pnpm exec electron-vite build
      - name: Electron E2E
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            xvfb-run --auto-servernum pnpm test:e2e
          else
            pnpm test:e2e
          fi
      - name: Restore hardened production build
        run: pnpm build
      - run: ${{ matrix.command }}
      - name: Prepare Linux sandbox helper for packaged smoke
        if: runner.os == 'Linux'
        run: |
          sudo chown root:root dist/linux-unpacked/chrome-sandbox
          sudo chmod 4755 dist/linux-unpacked/chrome-sandbox
      - name: Verify and launch packaged application
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            xvfb-run --auto-servernum pnpm verify:built-package dist
          else
            pnpm verify:built-package dist
          fi
      - name: Generate and validate runtime SBOM
        shell: bash
        run: |
          pnpm generate:sbom "${{ matrix.name }}" "dist/Upright-${VERSION}-${{ matrix.name }}-sbom.cdx.json"
          pnpm verify:sbom "dist/Upright-${VERSION}-${{ matrix.name }}-sbom.cdx.json"
          pnpm verify:notices "dist/Upright-${VERSION}-${{ matrix.name }}-sbom.cdx.json" --check
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: upright-${{ matrix.name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.cdx.json
          if-no-files-found: error

  draft:
    needs: [metadata, build]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: upright-*
          path: release-assets
          merge-multiple: true
      - name: Generate and verify checksums
        shell: bash
        working-directory: release-assets
        run: |
          find . -maxdepth 1 -type f ! -name SHASUMS256.txt -printf '%f\0' | sort -z | xargs -0 sha256sum > SHASUMS256.txt
          sha256sum --check SHASUMS256.txt
      - name: Verify exact artifact manifest
        run: node scripts/verify-release-assets.mjs release-assets "${VERSION#v}"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${VERSION#v}"
          notes="docs/releases/v${version}.md"
          args=(release create "$VERSION" release-assets/* --draft --title "Upright $VERSION")
          if [[ -f "$notes" ]]; then
            args+=(--notes-file "$notes")
          else
            args+=(--generate-notes)
          fi
          gh "${args[@]}"
