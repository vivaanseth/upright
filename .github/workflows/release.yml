name: Desktop release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: SemVer without a leading v
        required: false
        type: string
      draft:
        description: Create the release as a draft
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  POSTURE_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}

jobs:
  metadata:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      draft: ${{ steps.version.outputs.draft }}
    steps:
      - id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            draft="false"
          else
            version="${{ inputs.version }}"
            draft="${{ inputs.draft }}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must be SemVer without a leading v." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"

  build:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            command: pnpm dist:mac
            name: macos
          - os: windows-2025
            command: pnpm dist:win
            name: windows
          - os: ubuntu-24.04
            command: pnpm dist:linux
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Set release version
        shell: bash
        run: npm version "${{ needs.metadata.outputs.version }}" --no-git-tag-version --allow-same-version
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm libarchive-tools
      - run: pnpm test
      - run: pnpm build
      - run: ${{ matrix.command }}
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/Posture-${{ needs.metadata.outputs.version }}-${{ matrix.name }}-sbom.cdx.json
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: posture-${{ matrix.name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.cdx.json
          if-no-files-found: error

  draft:
    needs: [metadata, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: posture-*
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        working-directory: release-assets
        run: find . -maxdepth 1 -type f ! -name SHASUMS256.txt -print0 | sort -z | xargs -0 sha256sum > SHASUMS256.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          args=(release create "v${{ needs.metadata.outputs.version }}" release-assets/* --generate-notes --title "Posture v${{ needs.metadata.outputs.version }}")
          if [[ "${{ needs.metadata.outputs.draft }}" == "true" ]]; then
            args+=(--draft)
          fi
          gh "${args[@]}"
